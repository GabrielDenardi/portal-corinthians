services:
  postgres:
    image: postgres:16-alpine
    container_name: portal-corinthians-postgres
    environment:
      POSTGRES_DB: portal_corinthians
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - portal-corinthians-postgres:/var/lib/postgresql/data

volumes:
  portal-corinthians-postgres:
